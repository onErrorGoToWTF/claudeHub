<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ece9e2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)" />
    <script>
      // No-flash theme init: light by default. We only honor an explicit
      // user choice stored in localStorage — OS-level dark mode is
      // intentionally ignored so first-run + private browsing always
      // land in the light palette the design is tuned for.
      (function () {
        try {
          var stored = localStorage.getItem('ai-theme'); // 'light' | 'dark' | null
          var theme = stored === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>aiUniversity</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
