name: update-feed

on:
  schedule:
    # Every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build feed
        run: node scripts/build_latest_json.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/latest.json data/learn/academy_snapshot.json data/learn/academy_courses.json; then
            echo "No changes to feed."
            exit 0
          fi
          git add data/latest.json data/learn/academy_snapshot.json data/learn/academy_courses.json
          git commit -m "chore(feed): refresh latest.json [skip ci]"
          git push
