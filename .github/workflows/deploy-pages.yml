name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "revamp/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: revamp/package-lock.json

      - name: Install
        working-directory: revamp
        run: npm ci

      - name: Build
        working-directory: revamp
        run: npm run build

      # SPA fallback for GitHub Pages: serving 404.html for unknown paths
      # lets the BrowserRouter pick up the URL on deep-link refresh
      # (e.g., /claudeHub/learn). Without this, refresh on any non-root
      # route 404s and the user is booted.
      - name: Add SPA 404 fallback
        working-directory: revamp
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: revamp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
