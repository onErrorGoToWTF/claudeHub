name = "claudehub-lisa"
main = "src/index.js"
compatibility_date = "2026-04-01"
workers_dev = true

# Rate-limit storage. Create with:  wrangler kv namespace create RATE_LIMIT
# then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7e102cbe8cd4485185675c11cbc9b40a"

[vars]
GITHUB_OWNER = "onErrorGoToWTF"
GITHUB_REPO = "claudeHub"
GITHUB_BRANCH = "main"
# CORS allowlist — add custom domain later if you bind one.
ALLOWED_ORIGINS = "https://onerrorgotowtf.github.io"
# Max message length (characters).
MAX_MESSAGE_LEN = "2000"
# Requests allowed per IP per window.
RATE_WINDOW_SECONDS = "60"
RATE_MAX_REQUESTS = "3"

# Secrets (set with `wrangler secret put NAME`):
#   GITHUB_TOKEN      — fine-grained PAT, Contents: Read+Write on this repo only
#   TURNSTILE_SECRET  — optional; if unset, Turnstile is skipped
